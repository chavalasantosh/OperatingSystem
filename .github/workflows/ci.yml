name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate source and UEFI ABI invariants
        run: python3 scripts/source-check.py
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-uefi
      - name: Format
        run: cargo fmt --all -- --check
      - name: Kernel tests
        run: cargo test -p sanju-kernel
      - name: Kernel lint
        run: cargo clippy -p sanju-kernel --all-targets -- -D warnings
      - name: UEFI lint
        run: cargo clippy -p sanju-boot --target x86_64-unknown-uefi -- -D warnings
      - name: UEFI build
        run: cargo build -p sanju-boot --release --target x86_64-unknown-uefi

  qemu-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate source and UEFI ABI invariants
        run: python3 scripts/source-check.py
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi
      - name: Install emulator
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 ovmf
      - name: Boot in QEMU
        run: bash ./scripts/smoke-test.sh
